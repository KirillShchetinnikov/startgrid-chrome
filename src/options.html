<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-locale-message="options">Options</title>
  <!-- For Light/Dark mode: avoid flickering on reload -->
  <!-- block rendering styles with theme.js -->
  <!-- styles will go below -->
  <script src="js/theme.js"></script>
</head>

<body class="options">

  <div class="wrap">
    <a class="options-back-btn md-ripple" id="back_to_main" href="newtab.html">
      <svg class="options-back-btn__icon" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" aria-hidden="true">
        <path d="m10 6-6 6 6 6m-6-6h16"/>
      </svg>
      <span class="options-back-btn__label" data-locale-message="back_to_main">Back to bookmarks</span>

    <div class="settings-container" id="settings"></div>

    <!--end settings-->

    <footer class="footer">
      <div class="footer__wrap">
        <div class="footer__pull-left" id="ext_name"></div>
        <a href="https://github.com/KirillShchetinnikov/startgrid-chrome" target="_blank" rel="noopener noreferrer">GitHub</a>
        <div class="footer__pull-right" id="ext_version"></div>
      </div>
    </footer>

  </div>
  <!--end wrap-->

</html>

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          manifest_version="$(node -p "require('./static/manifest.json').version")"
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"

          test "$tag_version" = "$manifest_version"
          test "$tag_version" = "$package_version"

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Build Chrome extension
        run: npm run build

      - name: Package extension
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          npm run zip
          mv startgrid-chrome.zip "dist/startgrid-chrome-${RELEASE_TAG}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.zip --generate-notes --verify-tag
